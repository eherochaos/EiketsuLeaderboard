<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="战场环境主视觉">
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#22120e"/>
      <stop offset="0.34" stop-color="#7b2e24"/>
      <stop offset="0.66" stop-color="#2f615d"/>
      <stop offset="1" stop-color="#0f1010"/>
    </linearGradient>
    <radialGradient id="sun" cx="58%" cy="30%" r="36%">
