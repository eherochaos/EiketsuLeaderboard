name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  production:
    runs-on: [self-hosted, linux, eiketsu-prod]
    environment: production
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/home/ubuntu/EiketsuLeaderboard' }}
      DEPLOY_EXPORT_POSTGRES: ${{ secrets.DEPLOY_EXPORT_POSTGRES || '1' }}
      DEPLOY_EXPORT_CONTAINER: ${{ secrets.DEPLOY_EXPORT_CONTAINER || 'eiketsu-env-db-api-1' }}
      DEPLOY_EXPORT_ASSET_ROOT: ${{ secrets.DEPLOY_EXPORT_ASSET_ROOT || '/home/ubuntu/eiketsu-env-db/assets' }}
      DEPLOY_FASTAPI_CONTAINER: ${{ secrets.DEPLOY_FASTAPI_CONTAINER || 'eiketsu-env-db-api-1' }}
      DEPLOY_FASTAPI_FRONTEND_ROOT: ${{ secrets.DEPLOY_FASTAPI_FRONTEND_ROOT || '/app/frontend/eiketsu-leaderboard' }}
      DEPLOY_LIVE_FRONTEND_ROOT: ${{ secrets.DEPLOY_LIVE_FRONTEND_ROOT || '/home/ubuntu/eiketsu-env-db/frontend/eiketsu-leaderboard' }}
      DEPLOY_LIVE_SNAPSHOT_FILE: ${{ secrets.DEPLOY_LIVE_SNAPSHOT_FILE || '/home/ubuntu/eiketsu-leaderboard-data/snapshots/leaderboard-snapshot.json' }}
      DEPLOY_LIVE_STATUS_FILE: ${{ secrets.DEPLOY_LIVE_STATUS_FILE }}
      DEPLOY_RESTART_COMMAND: ${{ secrets.DEPLOY_RESTART_COMMAND }}
      DEPLOY_PUBLIC_URL_BASE: ${{ secrets.DEPLOY_PUBLIC_URL_BASE || 'http://127.0.0.1:8000' }}
      SITE_ANALYTICS_ADMIN_TOKEN: ${{ secrets.SITE_ANALYTICS_ADMIN_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Check deploy config
        run: |
          missing=0
          for name in DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "$name is missing"
              missing=1
            fi
          done
          case "$DEPLOY_EXPORT_POSTGRES" in
            0|1) ;;
            *)
              echo "DEPLOY_EXPORT_POSTGRES must be 0 or 1"
              missing=1
              ;;
          esac
          if [ -z "$SITE_ANALYTICS_ADMIN_TOKEN" ]; then
            echo "SITE_ANALYTICS_ADMIN_TOKEN is not set; /admin-stats/ summary will return 503"
          fi
          exit "$missing"

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Typecheck web
        working-directory: apps/web
        run: npm run typecheck

      - name: Build web
        working-directory: apps/web
        run: npm run build

      - name: Deploy on self-hosted server
        run: bash scripts/deploy/self-hosted-main.sh

      - name: Smoke public deployment
        run: |
          public_base="${DEPLOY_PUBLIC_URL_BASE%/}"
          snapshot_file="$RUNNER_TEMP/tier-list-snapshot.json"
          curl -fsS "$public_base/api/tier-list-snapshot" -o "$snapshot_file"
          deck_id="$(node -e 'const fs = require("fs"); const data = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); const row = (data.tierRows || [])[0]; if (!row || !row.deckId) process.exit(1); console.log(encodeURIComponent(String(row.deckId)));' "$snapshot_file")"
          curl -fsS "$public_base/api/tier-list-deck-config?scope=deck&deckId=$deck_id" >/dev/null
          curl -fsS "$public_base/tier-list/" >/dev/null
          curl -fsS "$public_base/admin-stats/" >/dev/null
